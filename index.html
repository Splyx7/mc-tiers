<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splyxtiers – Improved</title>

<style>
:root{
 --bg:#0b1220;
 --panel:#020617;
 --soft:#111827;
 --gold:#facc15;
 --text:#e5e7eb;
}
*{box-sizing:border-box}

/* 🌅 Animated Sky Background */
body{
 margin:0;
 font-family:Inter,Arial,sans-serif;
 color:var(--text);
 background:linear-gradient(180deg,#ff7e5f,#feb47b,#1e3c72,#2a5298);
 background-size:400% 400%;
 animation:skyMove 20s ease infinite;
 overflow-x:hidden;
}

/* floating clouds */
body::before{
 content:"";
 position:fixed;
 inset:0;
 background:url("https://i.imgur.com/7b1s9Qy.png") repeat-x;
 opacity:0.25;
 animation:clouds 60s linear infinite;
 pointer-events:none;
}

@keyframes skyMove{
 0%{background-position:0% 50%}
 50%{background-position:100% 50%}
 100%{background-position:0% 50%}
}

@keyframes clouds{
 from{background-position:0 0}
 to{background-position:2000px 0}
}

header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:14px 22px;
 background:rgba(2,6,23,0.6);
 backdrop-filter:blur(10px);
}
.logo{
 font-size:22px;
 font-weight:900;
 background:linear-gradient(90deg,#22c55e,#facc15);
 -webkit-background-clip:text;
 color:transparent
}
.gear{
 font-size:22px;
 cursor:pointer;
 transition:.3s
}
.gear:hover{transform:rotate(90deg)}

.tabs{
 display:flex;
 gap:10px;
 justify-content:center;
 padding:16px;
 flex-wrap:wrap
}
.tabs button{
 padding:10px 16px;
 border-radius:999px;
 border:none;
 background:var(--soft);
 color:#cbd5f5;
 font-weight:800;
 cursor:pointer
}
.tabs button.active,
.tabs button:hover{
 background:var(--gold);
 color:#020617
}

.container{
 max-width:1200px;
 margin:auto;
 padding:0 16px 160px
}
.row{
 display:flex;
 align-items:center;
 gap:14px;
 padding:14px 18px;
 border-radius:18px;
 background:rgba(2,6,23,0.6);
 backdrop-filter:blur(10px);
 margin-bottom:10px;
 cursor:pointer;
 transition:all .25s ease
}
.row:hover{
 transform:translateY(-4px) scale(1.015);
}

.top1{box-shadow:0 0 35px rgba(250,204,21,.9)}
.top2{box-shadow:0 0 30px rgba(192,192,192,.8)}
.top3{box-shadow:0 0 30px rgba(205,127,50,.8)}
.top1:hover{box-shadow:0 0 35px rgba(250,204,21,.9)}
.top2:hover{box-shadow:0 0 30px rgba(192,192,192,.8)}
.top3:hover{box-shadow:0 0 30px rgba(205,127,50,.8)}

.rank{width:34px;font-weight:900}
.head{width:42px;height:42px;border-radius:10px}
.name{flex:1;font-weight:800}
.points{font-size:12px;opacity:.7}
.tiers{display:flex;gap:8px;flex-wrap:wrap}

.tier{
 width:46px;
 height:46px;
 border-radius:50%;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 font-size:10px;
 font-weight:900;
 transition:.25s
}
.tier:hover{
 transform:scale(1.25) rotate(3deg);
}

/* Tier colors */
.HT1{background:#fde047;color:#000}
.LT1{background:#facc15;color:#000}
.HT2{background:#d1d5db;color:#000}
.LT2{background:#9ca3af;color:#000}
.HT3{background:#d6a36c;color:#000}
.LT3{background:#8b5a2b;color:#fff}
.HT4{background:#e5e7eb;color:#000}
.LT4{background:#374151;color:#fff}
.HT5,.LT5{background:#dc2626;color:#fff}

/* Dynamic glow */
.HT1:hover{box-shadow:0 0 20px #fde047}
.LT1:hover{box-shadow:0 0 20px #facc15}
.HT2:hover{box-shadow:0 0 20px #d1d5db}
.LT2:hover{box-shadow:0 0 20px #9ca3af}
.HT3:hover{box-shadow:0 0 20px #d6a36c}
.LT3:hover{box-shadow:0 0 20px #8b5a2b}
.HT4:hover{box-shadow:0 0 20px #e5e7eb}
.LT4:hover{box-shadow:0 0 20px #374151}
.HT5:hover,.LT5:hover{box-shadow:0 0 20px #dc2626}

</style>
</head>

<body>

<header>
 <div class="logo">Splyxtiers</div>
 <div class="gear" onclick="openLogin()">⚙️</div>
</header>

<div class="tabs" id="tabs"></div>
<div class="container" id="list"></div>

<script>
/* ICONS (real images) */
const icons={
 Sword:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/3/3f/Diamond_Sword_JE3_BE3.png",
 Axe:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/9/9b/Diamond_Axe_JE3_BE2.png",
 Mace:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/0/0c/Mace.png",
 UHC:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/5/5a/Heart.png",
 "Netherite OP":"https://static.wikia.nocookie.net/minecraft_gamepedia/images/6/6b/Netherite_Helmet_JE2_BE2.png",
 Pot:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/d/dc/Potion_of_Strength.png",
 SMP:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/4/4a/Ender_Pearl_JE2_BE2.png",
 Vanilla:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/9/9a/End_Crystal_JE2_BE2.png",
 Cart:"https://static.wikia.nocookie.net/minecraft_gamepedia/images/5/5a/TNT_Minecart_JE2_BE2.png"
}

const modes=["Overall","Sword","Axe","Mace","UHC","Netherite OP","Pot","SMP","Vanilla","Cart"]

const tierPoints={
 LT5:1,HT5:2,
 LT4:3,HT4:4,
 LT3:6,HT3:10,
 LT2:15,HT2:20,
 LT1:30,HT1:40
}

let players=[
 {name:"Splyx7_",tiers:{Sword:"HT3",Axe:"HT3",UHC:"HT3"}},
 {name:"SazeTT",tiers:{Sword:"HT3",Axe:"HT3",Mace:"HT3",UHC:"LT3",SMP:"LT3",Vanilla:"HT3",Cart:"HT3"}}
]

let current="Overall"

const tabs=document.getElementById("tabs")
const list=document.getElementById("list")

modes.forEach(m=>{
 const b=document.createElement("button")
 b.innerHTML=(m==="Overall"?"🏆":`<img src="${icons[m]}" style="width:16px;height:16px;vertical-align:middle;">`) + " " + m
 b.onclick=()=>{current=m;render();document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
 if(m==="Overall")b.classList.add("active")
 tabs.appendChild(b)
})

function skin(n){return "https://mc-heads.net/avatar/"+n+"/64"}
function points(p){return Object.values(p.tiers).reduce((s,t)=>s+(tierPoints[t]||0),0)}

function render(){
 list.innerHTML=""
 list.className="container "+(current==="Overall"?"overall":"")
 players.sort((a,b)=>{
  let pa=current==="Overall"?points(a):(tierPoints[a.tiers[current]]||0)
  let pb=current==="Overall"?points(b):(tierPoints[b.tiers[current]]||0)
  return pb-pa
 }).forEach((p,i)=>{
  let tierHTML=""
  if(current==="Overall"){
   for(let m in p.tiers){
    tierHTML+=`<div class="tier ${p.tiers[m]}">
     <img src="${icons[m]}" style="width:18px;height:18px;">
     <div>${p.tiers[m]}</div>
    </div>`
   }
  }else if(p.tiers[current]){
   tierHTML=`<div class="tier ${p.tiers[current]}">
    <img src="${icons[current]}" style="width:18px;height:18px;">
    <div>${p.tiers[current]}</div>
   </div>`
  }

  const row=document.createElement("div")
  row.className="row "+(i===0?"top1":i===1?"top2":i===2?"top3":"")
  row.innerHTML=`
   <div class="rank">${i+1}</div>
   <img class="head" src="${skin(p.name)}">
   <div class="name">${p.name}<div class="points">${points(p)} pts</div></div>
   <div class="tiers">${tierHTML}</div>
  `
  list.appendChild(row)
 })
}

render()
</script>

</body>
</html>
